<!DOCTYPE html>
<html>
    <head>
        <title>To-do list</title>
        <style>
            .center{
                text-align:center;
            }
            .left{
                text-align:left;
            }
        </style>
    </head>
    <body>
        <div class="center">
            <h2>To-Do list</h2>
            <button onclick="clearlist()">Reset</button><br>
            <ul id="demo" style="padding-left:0;display:inline-block" class="left"></ul>
            <form onsubmit="addtolist();return false">
                <label for="list"></label>
                <input type="text" id="list" name="list">
            </form>
        </div>
        <script>
            function addtolist(){
                let item = document.getElementById("list").value;
                document.getElementById("demo").innerHTML += "<li style='display:flex;justify-content:space-between'>"+
                    "<span>"+
                    "<input type=checkbox onchange=changeColor(this)>"+
                    item+
                    "</span>"+
                    "<button onclick=\"this.parentElement.remove()\" style='margin-left:10px'>x</button>"+
                    "</li>";
                document.getElementById("list").value="";
            }
            function clearlist(){
                document.getElementById("demo").innerHTML=""
            }
            function changeColor(button){
                if(button.checked){button.parentElement.style.backgroundColor='grey';button.parentElement.parentElement.children[1].style.backgroundColor='grey'}
                else{button.parentElement.style.backgroundColor='white';button.parentElement.parentElement.children[1].style.backgroundColor=''};
            }
        </script>
    </body>
</html>
