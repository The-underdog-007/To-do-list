<!DOCTYPE html>
<html>
    <head>
        <title>To-do list</title>
        <style>
            .center{
                text-align:center;
            }
            .left{
                text-align:left;
            }
            .square{
                width:500px;
                height:400px;
                border:2px solid black;
                padding: 10px;
                overflow: auto;
                margin: auto;
                box-sizing: border-box;
                margin-top: 100px;
            }
            .innersquare{
                width:450px;
                height:250px;
                border:2px solid black;
                padding: 10px;
                overflow: auto;
                margin: auto;
                box-sizing: border-box;                
            }
        </style>
    </head>
    <body style="background-color: #50586C;">
        <div class="center">
            <div class="square" style="background-color: #DCE2F0;">
                <h1 style="font-size: 50px;margin-bottom: 10px;">To-Do list</h1>
                <div class="innersquare">
                    <ul id="demo" style="padding-left:0;display:inline-block" class="left"></ul>
                    <form onsubmit="addtolist();return false">
                        <label for="list"></label>
                        <input type="text" id="list" name="list">
                    </form>
                    <br>
                </div>
            </div>
            <button onclick="clearAll()" style="background-color:#DCE2F0; margin-top:10px ">Clear all</button>
            <button onclick="changeAll()" style="background-color:#DCE2F0; margin-top:10px ">Mark all</button>
            <button onclick="clearlist()" style="background-color: #DCE2F0;">Reset</button><br>
        </div>
        <script>
            function addtolist(){
                let item = document.getElementById("list").value;
                document.getElementById("demo").insertAdjacentHTML("beforeend",
                    "<li style='display:flex;justify-content:space-between'>"+
                    "<span style='overflow-wrap:break-word; max-width:400px'>"+
                    "<input type=checkbox onchange=changeColor(this)>"+
                    item+
                    "</span>"+
                    "<button onclick=\"this.parentElement.remove()\" style='margin-left:10px'>x</button>"+
                    "</li>");
                document.getElementById("list").value="";
            }
            function clearlist(){
                document.getElementById("demo").innerHTML=""
            }
            function changeColor(button){
                if(button.checked){button.parentElement.style.backgroundColor='#50586C';button.parentElement.parentElement.children[1].style.backgroundColor='#50586C'}
                else{button.parentElement.style.backgroundColor='#DCE2F0';button.parentElement.parentElement.children[1].style.backgroundColor=''};
            }
            function changeAll(){
                let y=document.getElementById("demo").children;
                for( let z = 0; z<y.length;z++){
                    let x=document.getElementById("demo").children[z].children[0].children[0];
                    x.checked=true;
                    changeColor(x);
                }
            }
            function clearAll(){
                let y=document.getElementById("demo").children;
                for( let z = 0; z<y.length;z++){
                    let x=document.getElementById("demo").children[z].children[0].children[0];
                    x.checked=false;
                    changeColor(x);
                }
            }
        </script>
    </body>
</html>
