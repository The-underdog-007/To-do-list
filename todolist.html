<!DOCTYPE html>
<html>
    <head>
        <title>To-do list</title>
        <style>
            .center{
                text-align:center;
            }
            .left{
                text-align:left;
            }
        </style>
    </head>
    <body>
        <div class="center">
            <h2>To-Do list</h2>
            <button onclick="clearlist()">Reset</button>
            <ul id="demo" style="padding-left:0"></ul>
            <form onsubmit="addtolist();return false">
                <label for="list"></label>
                <input type="text" id="list" name="list">
            </form>
        </div>
        <script>
            function addtolist(){
                let item = document.getElementById("list").value;
                document.getElementById("demo").innerHTML += "<li style='display:inline-block'>"+
                    "<input type=checkbox onchange=\"if(this.checked){this.parentElement.style.backgroundColor='grey'}else{this.parentElement.style.backgroundColor='white'}\">"+
                    item+
                    " <button onclick=\"this.parentElement.nextSibling.remove();this.parentElement.remove()\">x</button>"+
                    "</li>"+"<br>";
                document.getElementById("list").value="";
            }
            function clearlist(){
                document.getElementById("demo").innerHTML=""
            }
        </script>
    </body>
</html>
